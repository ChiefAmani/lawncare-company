<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('data:text/css,');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #F7F5F0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Arial Black', 'Impact', sans-serif;
    position: relative;
  }
  /* Subtle corner decorations */
  .corner-tl, .corner-br {
    position: absolute; width: 120px; height: 120px;
    border: 5px solid #111;
  }
  .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
  .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
  .inner {
    text-align: center; padding: 60px; max-width: 920px;
  }
  .eyebrow {
    font-family: Arial, sans-serif;
    font-size: 18px; font-weight: 400; letter-spacing: 6px;
    text-transform: uppercase; color: #888888;
    margin-bottom: 32px;
  }
  .headline {
    font-size: 100px; font-weight: 900; line-height: 1.0;
    color: #111111; letter-spacing: -3px;
    text-transform: uppercase; margin-bottom: 0;
  }
  .headline span { color: #4CAF50; } /* accent word */
  .divider {
    width: 80px; height: 5px; background: #111111;
    margin: 44px auto;
  }
  .tagline {
    font-family: Georgia, serif; font-size: 26px;
    color: #444444; font-style: italic; font-weight: 400;
    line-height: 1.6; max-width: 700px; margin: 0 auto;
  }
  .cta {
    margin-top: 56px;
    display: inline-block; background: #111111;
    color: #ffffff; font-family: Arial, sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; padding: 20px 52px;
  }
  .brand {
    position: absolute; bottom: 52px;
    font-family: Arial, sans-serif; font-size: 15px;
    letter-spacing: 4px; text-transform: uppercase;
    color: #AAAAAA; font-weight: 400;
  }
</style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="inner">
    <div class="eyebrow">Premium Lawncare</div>
    <div class="headline">Take Back<br>Your <span>Weekend.</span></div>
    <div class="divider"></div>
    <div class="tagline">We handle the yard work so you can enjoy your time off.</div>
    <div class="cta">GET A QUOTE</div>
  </div>
  <div class="brand">GreenScapes Lawncare</div>
</body>
</html>
