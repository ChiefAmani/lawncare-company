<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #4CAF50;
    position: relative;
    font-family: 'Arial Black', Impact, sans-serif;
  }
  /* Sunburst rays */
  .rays {
    position: absolute; top: 50%; left: 50%;
    width: 1600px; height: 1600px;
    transform: translate(-50%, -50%);
    background: repeating-conic-gradient(
      rgba(255,255,255,0.12) 0deg 10deg,
      transparent 10deg 20deg
    );
    border-radius: 50%;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px;
    text-align: center;
  }
  .top-tag {
    background: #111111; color: #ffffff;
    font-size: 17px; letter-spacing: 5px;
    text-transform: uppercase; padding: 10px 30px;
    margin-bottom: 36px;
    font-family: Arial, sans-serif; font-weight: 700;
  }
  .main-label {
    font-size: 140px; font-weight: 900;
    color: #ffffff; line-height: 0.9;
    text-transform: uppercase;
    text-shadow: 6px 6px 0px rgba(0,0,0,0.3);
    letter-spacing: -4px;
  }
  .discount-box {
    background: #ffffff; margin: 36px 0;
    padding: 24px 64px;
    box-shadow: 8px 8px 0px rgba(0,0,0,0.25);
  }
  .discount {
    font-size: 96px; font-weight: 900;
    color: #111111; line-height: 1;
    letter-spacing: -3px;
  }
  .discount sub {
    font-size: 40px; vertical-align: super;
    color: #4CAF50;
  }
  .subtext {
    color: rgba(255,255,255,0.9); font-size: 22px;
    font-family: Arial, sans-serif; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 36px;
  }
  .cta {
    background: #111111; color: #ffffff;
    font-size: 22px; font-weight: 700;
    letter-spacing: 5px; text-transform: uppercase;
    padding: 22px 72px; border: none;
    box-shadow: 5px 5px 0px rgba(0,0,0,0.4);
  }
  .footer {
    position: absolute; bottom: 44px;
    color: rgba(255,255,255,0.7);
    font-family: Arial, sans-serif; font-size: 16px;
    letter-spacing: 2px;
  }
  /* Corner brackets */
  .bracket { position: absolute; width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.5); }
  .bracket.tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
  .bracket.tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
  .bracket.bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
  .bracket.br { bottom: 30px; right: 30px; border-left: none; border-top: none; }
</style>
</head>
<body>
  <div class="rays"></div>
  <div class="bracket tl"></div><div class="bracket tr"></div>
  <div class="bracket bl"></div><div class="bracket br"></div>
  <div class="content">
    <div class="top-tag">Spring Special</div>
    <div class="main-label">FIRST MOW<br>FREE</div>
    <div class="discount-box">
      <div class="discount">100<sub>% OFF</sub></div>
    </div>
    <div class="subtext">When you sign up for weekly service</div>
    <button class="cta">CLAIM OFFER</button>
  </div>
  <div class="footer">www.greenscapes.com</div>
</body>
</html>
